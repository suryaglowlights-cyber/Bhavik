name = "bhavik-dropshipping-api"
type = "javascript"
account_id = "" # REQUIRED: Run `wrangler whoami` to get your account ID
workers_dev = true
route = "" # Set this after deploying: your-api-domain.workers.dev
zone_id = "" # Set this if using custom domain

[build]
command = "npm install && npm run build"
cwd = "./"

[env.production]
routes = [{ pattern = "api.yourdomain.com/*", zone_id = "" }] # TODO: Update with your domain

# D1 Database for order tracking and analytics
[[d1_databases]]
binding = "DB"
database_name = "bhavik-dropshipping"
database_id = "" # REQUIRED: Run `wrangler d1 create bhavik-dropshipping` and paste ID here

# KV Namespace for product caching (4-hour TTL)
[[kv_namespaces]]
binding = "SUPPLIER_CACHE"
id = "" # REQUIRED: Run `wrangler kv:namespace create "SUPPLIER_CACHE"` and paste ID here

# KV Namespace for API keys storage
[[kv_namespaces]]
binding = "API_KEYS_KV"
id = "" # REQUIRED: Run `wrangler kv:namespace create "API_KEYS_KV"` and paste ID here

# Production KV namespaces (create with --preview flag)
[env.production.kv_namespaces]
binding = "SUPPLIER_CACHE"
id = "" # REQUIRED: Run `wrangler kv:namespace create "SUPPLIER_CACHE" --preview` and paste ID here

[env.production.kv_namespaces]
binding = "API_KEYS_KV"
id = "" # REQUIRED: Run `wrangler kv:namespace create "API_KEYS_KV" --preview` and paste ID here

# Scheduled product sync every 4 hours
[triggers]
crons = ["0 */4 * * *"]
